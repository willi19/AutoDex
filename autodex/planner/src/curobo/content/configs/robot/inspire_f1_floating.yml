          right_thumb_3: [right_thumb_4, thumb_force_sensor],
          right_thumb_4: [thumb_force_sensor],
          thumb_force_sensor: [],
          right_index_1: [right_index_2],
          right_index_2: [index_force_sensor],
          index_force_sensor: [],
          right_middle_1: [right_middle_2],
          right_middle_2: [middle_force_sensor],
          middle_force_sensor: [],
          right_ring_1: [right_ring_2],
          right_ring_2: [ring_force_sensor],
          ring_force_sensor: [],
          right_little_1: [right_little_2],
          right_little_2: [little_force_sensor],
          little_force_sensor: []
        }
        self_collision_buffer: {
          "base_link": 0.0,
          "plam_2": 0.0,
          "plam_3": 0.0,
          "right_thumb_1": 0.0,
          "right_thumb_2": 0.002,
          "right_thumb_3": 0.002,
          "right_thumb_4": 0.0,
          "right_index_1": 0.0,
          "right_index_2": 0.0,
          "right_middle_1": 0.0,
          "right_middle_2": 0.0,
          "right_ring_1": 0.0,
          "right_ring_2": 0.0,
          "right_little_1": 0.0,
          "right_little_2": 0.0,
          "thumb_force_sensor": 0.0,
          "index_force_sensor": 0.0,
          "middle_force_sensor": 0.0,
          "ring_force_sensor": 0.0,
          "little_force_sensor": 0.0
