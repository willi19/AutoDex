robot_cfg:
    kinematics:
        use_usd_kinematics: False
        usd_path: ""
        usd_robot_root: ""
        isaac_usd_path: ""
        usd_flip_joints: {}
        usd_flip_joint_limits: []

        urdf_path: "robot/inspire_f1_description/inspire_f1_floating.urdf"
        asset_root_path: "robot/inspire_f1_description"

        base_link: "world"
        ee_link: "base_link"
        link_names: [
            "inspire_root0", "inspire_root1", "inspire_root2", "inspire_root3", "inspire_root4", "inspire_root5",
            "wrist", "base_link",
            "plam_2", "plam_3",
            "right_thumb_1", "right_thumb_2", "right_thumb_3", "right_thumb_4",
            "right_index_1", "right_index_2",
            "right_middle_1", "right_middle_2",
            "right_ring_1", "right_ring_2",
            "right_little_1", "right_little_2",
            "thumb_force_sensor", "index_force_sensor", "middle_force_sensor",
            "ring_force_sensor", "little_force_sensor"
        ]

        collision_link_names: [
