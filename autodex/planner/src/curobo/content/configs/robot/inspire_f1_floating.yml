          "right_little_1", "right_little_2",
          "thumb_force_sensor", "index_force_sensor", "middle_force_sensor",
          "ring_force_sensor", "little_force_sensor"
        ]

        collision_spheres: "spheres/inspire_f1.yml"
        collision_sphere_buffer: -0.002
        self_collision_ignore: {
          base_link: [plam_2, plam_3, right_thumb_1, right_index_1, right_middle_1, right_ring_1, right_little_1],
          plam_2: [plam_3, right_little_1, right_ring_1, right_middle_1, right_index_1],
