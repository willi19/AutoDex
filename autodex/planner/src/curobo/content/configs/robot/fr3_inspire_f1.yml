## FR3 + Inspire F1 (RH56F1) Right Hand
## 7-DOF FR3 arm + 6-DOF (actuated) Inspire F1 right hand.
## Hand link names follow inspire_f1_hand_right.urdf:
##   palm:          base_link, plam_1, plam_2, plam_3, plam_force_sensor
##   fingers:       right_thumb_{1..4}, right_{index,middle,ring,little}_{1,2}
##   tips/sensors:  *_tip, *_force_sensor (5 each)
robot_cfg:
    kinematics:
        use_usd_kinematics: False
        usd_path: ""
        usd_robot_root: ""
        isaac_usd_path: ""
        usd_flip_joints: {}
        usd_flip_joint_limits: []

        urdf_path: "robot/fr3_inspire_f1_description/fr3_inspire_f1.urdf"
        asset_root_path: "robot/fr3_inspire_f1_description"

        base_link: "base"
        ee_link: "base_link"
        link_names: [
            "fr3_link0", "fr3_link1", "fr3_link2", "fr3_link3",
            "fr3_link4", "fr3_link5", "fr3_link6", "fr3_link7",
            "base_link", "plam_1", "plam_2", "plam_3", "plam_force_sensor",
